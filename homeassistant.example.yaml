      # -------------------------------------------------------------------
      # AC Power (scaled)
      # -------------------------------------------------------------------

      - unique_id: solaredge_power_ac
        name: "SolarEdge AC Power"
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:solar-power
        state: >
          {% set raw = states('sensor.solaredge_ac_power_raw') | float(0) %}
          {% set scale = states('sensor.solaredge_ac_power_scale_factor') | int(0) %}
          {{ (raw * 10**(scale)) | round(1) }}
        availability: >
          {{ states('sensor.solaredge_ac_power_raw') not in ['unknown', 'unavailable']
