          {{ states('sensor.solaredge_l1_n_voltage_raw') not in ['unknown', 'unavailable']
             and states('sensor.solaredge_voltage_scale_factor') not in ['unknown', 'unavailable'] }}

      - unique_id: solaredge_l2n_voltage
        name: "SolarEdge L2-N Voltage"
        unit_of_measurement: "V"
        device_class: voltage
