          {{ states('sensor.solaredge_l2_current_raw') not in ['unknown', 'unavailable']
             and states('sensor.solaredge_current_scale_factor') not in ['unknown', 'unavailable'] }}

      - unique_id: solaredge_l3_current
        name: "SolarEdge L3 Current"
        unit_of_measurement: "A"
        device_class: current
        state_class: measurement
        icon: mdi:current-ac
        state: >
          {% set raw = states('sensor.solaredge_l3_current_raw') | float(0) %}
          {% set scale = states('sensor.solaredge_current_scale_factor') | int(0) %}
          {{ (raw * 10**(scale)) | round(2) }}
        availability: >
          {{ states('sensor.solaredge_l3_current_raw') not in ['unknown', 'unavailable']
             and states('sensor.solaredge_current_scale_factor') not in ['unknown', 'unavailable'] }}

      # -------------------------------------------------------------------
      # AC Voltage (scaled)
      # -------------------------------------------------------------------

      - unique_id: solaredge_l1_voltage
        name: "SolarEdge L1 Voltage"
        unit_of_measurement: "V"
        device_class: voltage
        state_class: measurement
        icon: mdi:sine-wave
        state: >
          {% set raw = states('sensor.solaredge_l1_voltage_raw') | float(0) %}
          {% set scale = states('sensor.solaredge_voltage_scale_factor') | int(0) %}
          {{ (raw * 10**(scale)) | round(1) }}
        availability: >
          {{ states('sensor.solaredge_l1_voltage_raw') not in ['unknown', 'unavailable']
             and states('sensor.solaredge_voltage_scale_factor') not in ['unknown', 'unavailable'] }}

      - unique_id: solaredge_l2_voltage
        name: "SolarEdge L2 Voltage"
        unit_of_measurement: "V"
        device_class: voltage
        state_class: measurement
        icon: mdi:sine-wave
        state: >
          {% set raw = states('sensor.solaredge_l2_voltage_raw') | float(0) %}
          {% set scale = states('sensor.solaredge_voltage_scale_factor') | int(0) %}
          {{ (raw * 10**(scale)) | round(1) }}
        availability: >
          {{ states('sensor.solaredge_l2_voltage_raw') not in ['unknown', 'unavailable']
             and states('sensor.solaredge_voltage_scale_factor') not in ['unknown', 'unavailable'] }}

      - unique_id: solaredge_l3_voltage
        name: "SolarEdge L3 Voltage"
        unit_of_measurement: "V"
