        device_class: voltage
        state_class: measurement
        icon: mdi:sine-wave
        state: >
          {% set raw = states('sensor.solaredge_l1_n_voltage_raw') | float(0) %}
          {% set scale = states('sensor.solaredge_voltage_scale_factor') | int(0) %}
          {{ (raw * 10**(scale)) | round(1) }}
