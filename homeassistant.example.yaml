    # =====================================================================
    # Inverter — DC Current (raw)
    # =====================================================================

    - unique_id: solaredge_current_dc_raw
      name: "SolarEdge DC Current (raw)"
      state_topic: "solaredge/inverter/current_dc"
      state_class: measurement
