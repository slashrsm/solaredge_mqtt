      device: *solaredge_device

    - unique_id: solaredge_current_dc_scale
      name: "SolarEdge DC Current Scale Factor"
      state_topic: "solaredge/inverter/current_dc_scale"
      icon: mdi:exponent
      entity_category: diagnostic
      device: *solaredge_device

    # =====================================================================
    # Inverter — DC Voltage (raw)
