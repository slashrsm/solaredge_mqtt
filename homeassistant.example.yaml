# Home Assistant package configuration for SolarEdge MQTT Bridge
#
# USAGE: Include this file as a Home Assistant package in configuration.yaml:
#
#   homeassistant:
#     packages:
#       solaredge: !include solaredge.yaml
#
# Copy this file to your HA config directory (e.g. as "solaredge.yaml")
# and add the lines above to your configuration.yaml, then restart HA.
#
# IMPORTANT: Values published by this bridge are RAW register values.
# Scale factors are published as separate topics. To get real-world values,
# you must apply scaling: real_value = raw_value * 10^(scale_factor)
#
# For example:
#   power_ac = 15574, power_ac_scale = -1 → 15574 * 10^(-1) = 1557.4 W
#
# This file includes:
#   1. Raw MQTT sensors for all published inverter topics
#   2. Template sensors (at the bottom) that apply scale factors automatically
#
# Adjust "solaredge/inverter" if you changed mqtt.base_topic in config.yaml.

mqtt:

  sensor:

    # =====================================================================
    # Inverter — Device Information
    # =====================================================================

    - unique_id: solaredge_c_id
      name: "SolarEdge SunSpec ID"
      state_topic: "solaredge/inverter/c_id"
      icon: mdi:identifier
      device: &solaredge_device
        identifiers:
          - "solaredge_inverter"
        manufacturer: "SolarEdge"
        model: "Inverter"
        name: "SolarEdge Inverter"

    - unique_id: solaredge_c_did
      name: "SolarEdge SunSpec DID"
      state_topic: "solaredge/inverter/c_did"
      icon: mdi:identifier
      device: *solaredge_device

    - unique_id: solaredge_c_length
      name: "SolarEdge SunSpec Length"
      state_topic: "solaredge/inverter/c_length"
      icon: mdi:ruler
      device: *solaredge_device

    - unique_id: solaredge_c_manufacturer
      name: "SolarEdge Manufacturer"
      state_topic: "solaredge/inverter/c_manufacturer"
      icon: mdi:factory
      device: *solaredge_device

    - unique_id: solaredge_c_model
      name: "SolarEdge Model"
      state_topic: "solaredge/inverter/c_model"
      icon: mdi:information-outline
      device: *solaredge_device

    - unique_id: solaredge_c_version
      name: "SolarEdge Firmware Version"
      state_topic: "solaredge/inverter/c_version"
      icon: mdi:chip
      device: *solaredge_device

    - unique_id: solaredge_c_serialnumber
      name: "SolarEdge Serial Number"
      state_topic: "solaredge/inverter/c_serialnumber"
      icon: mdi:barcode
      device: *solaredge_device

    - unique_id: solaredge_c_deviceaddress
      name: "SolarEdge Modbus Address"
      state_topic: "solaredge/inverter/c_deviceaddress"
      icon: mdi:network-outline
      device: *solaredge_device

    - unique_id: solaredge_c_sunspec_did
      name: "SolarEdge SunSpec Inverter DID"
      state_topic: "solaredge/inverter/c_sunspec_did"
      icon: mdi:identifier
      device: *solaredge_device

    - unique_id: solaredge_c_sunspec_length
      name: "SolarEdge SunSpec Inverter Length"
      state_topic: "solaredge/inverter/c_sunspec_length"
      icon: mdi:ruler
      device: *solaredge_device

    # =====================================================================
    # Inverter — AC Current (raw)
    # =====================================================================

    - unique_id: solaredge_current_raw
      name: "SolarEdge AC Current (raw)"
      state_topic: "solaredge/inverter/current"
      state_class: measurement
      icon: mdi:current-ac
      device: *solaredge_device

    - unique_id: solaredge_l1_current_raw
      name: "SolarEdge L1 Current (raw)"
      state_topic: "solaredge/inverter/l1_current"
      state_class: measurement
      icon: mdi:current-ac
      device: *solaredge_device

    - unique_id: solaredge_l2_current_raw
      name: "SolarEdge L2 Current (raw)"
      state_topic: "solaredge/inverter/l2_current"
      state_class: measurement
      icon: mdi:current-ac
      device: *solaredge_device

    - unique_id: solaredge_l3_current_raw
      name: "SolarEdge L3 Current (raw)"
      state_topic: "solaredge/inverter/l3_current"
      state_class: measurement
      icon: mdi:current-ac
      device: *solaredge_device

    - unique_id: solaredge_current_scale
      name: "SolarEdge Current Scale Factor"
      state_topic: "solaredge/inverter/current_scale"
      icon: mdi:exponent
      entity_category: diagnostic
      device: *solaredge_device

    # =====================================================================
    # Inverter — AC Voltage (raw)
    # =====================================================================

    - unique_id: solaredge_l1_voltage_raw
      name: "SolarEdge L1 Voltage (raw)"
      state_topic: "solaredge/inverter/l1_voltage"
      state_class: measurement
      icon: mdi:sine-wave
      device: *solaredge_device

    - unique_id: solaredge_l2_voltage_raw
      name: "SolarEdge L2 Voltage (raw)"
      state_topic: "solaredge/inverter/l2_voltage"
      state_class: measurement
      icon: mdi:sine-wave
      device: *solaredge_device

    - unique_id: solaredge_l3_voltage_raw
      name: "SolarEdge L3 Voltage (raw)"
      state_topic: "solaredge/inverter/l3_voltage"
      state_class: measurement
      icon: mdi:sine-wave
      device: *solaredge_device

    - unique_id: solaredge_l1n_voltage_raw
      name: "SolarEdge L1-N Voltage (raw)"
      state_topic: "solaredge/inverter/l1n_voltage"
      state_class: measurement
      icon: mdi:sine-wave
      device: *solaredge_device

    - unique_id: solaredge_l2n_voltage_raw
      name: "SolarEdge L2-N Voltage (raw)"
      state_topic: "solaredge/inverter/l2n_voltage"
      state_class: measurement
      icon: mdi:sine-wave
      device: *solaredge_device

    - unique_id: solaredge_l3n_voltage_raw
      name: "SolarEdge L3-N Voltage (raw)"
      state_topic: "solaredge/inverter/l3n_voltage"
      state_class: measurement
      icon: mdi:sine-wave
      device: *solaredge_device

    - unique_id: solaredge_voltage_scale
      name: "SolarEdge Voltage Scale Factor"
      state_topic: "solaredge/inverter/voltage_scale"
      icon: mdi:exponent
      entity_category: diagnostic
      device: *solaredge_device

    # =====================================================================
    # Inverter — AC Power (raw)
    # =====================================================================

    - unique_id: solaredge_power_ac_raw
      name: "SolarEdge AC Power (raw)"
      state_topic: "solaredge/inverter/power_ac"
      state_class: measurement
      icon: mdi:solar-power
      device: *solaredge_device

    - unique_id: solaredge_power_ac_scale
      name: "SolarEdge AC Power Scale Factor"
      state_topic: "solaredge/inverter/power_ac_scale"
      icon: mdi:exponent
      entity_category: diagnostic
      device: *solaredge_device

    # =====================================================================
    # Inverter — Frequency (raw)
    # =====================================================================

    - unique_id: solaredge_frequency_raw
      name: "SolarEdge Frequency (raw)"
      state_topic: "solaredge/inverter/frequency"
      state_class: measurement
      icon: mdi:waveform
      device: *solaredge_device

    - unique_id: solaredge_frequency_scale
      name: "SolarEdge Frequency Scale Factor"
      state_topic: "solaredge/inverter/frequency_scale"
      icon: mdi:exponent
      entity_category: diagnostic
      device: *solaredge_device

    # =====================================================================
    # Inverter — Apparent Power (raw)
    # =====================================================================

    - unique_id: solaredge_power_apparent_raw
