# Home Assistant package configuration for SolarEdge MQTT Bridge
#
# USAGE: Include this file as a Home Assistant package in configuration.yaml:
#
#   homeassistant:
#     packages:
#       solaredge: !include solaredge.yaml
#
# Copy this file to your HA config directory (e.g. as "solaredge.yaml")
# and add the lines above to your configuration.yaml, then restart HA.
#
# Values are pre-scaled by the bridge (scale factors are applied before
# publishing), so all numeric values are in real-world units.
#
# Adjust "solaredge/inverter" if you changed mqtt.base_topic in config.yaml.

mqtt:

  sensor:

    # =====================================================================
    # Inverter — Device Information
    # =====================================================================

    - unique_id: solaredge_c_id
      name: "SolarEdge SunSpec ID"
      state_topic: "solaredge/inverter/c_id"
      icon: mdi:identifier
      device: &solaredge_device
        identifiers:
          - "solaredge_inverter"
        manufacturer: "SolarEdge"
        model: "Inverter"
        name: "SolarEdge Inverter"

    - unique_id: solaredge_c_did
      name: "SolarEdge SunSpec DID"
      state_topic: "solaredge/inverter/c_did"
      icon: mdi:identifier
      device: *solaredge_device

    - unique_id: solaredge_c_length
      name: "SolarEdge SunSpec Length"
      state_topic: "solaredge/inverter/c_length"
      icon: mdi:ruler
      device: *solaredge_device

    - unique_id: solaredge_c_manufacturer
      name: "SolarEdge Manufacturer"
      state_topic: "solaredge/inverter/c_manufacturer"
      icon: mdi:factory
      device: *solaredge_device

    - unique_id: solaredge_c_model
      name: "SolarEdge Model"
      state_topic: "solaredge/inverter/c_model"
      icon: mdi:information-outline
      device: *solaredge_device

    - unique_id: solaredge_c_version
      name: "SolarEdge Firmware Version"
      state_topic: "solaredge/inverter/c_version"
      icon: mdi:chip
      device: *solaredge_device

    - unique_id: solaredge_c_serialnumber
      name: "SolarEdge Serial Number"
      state_topic: "solaredge/inverter/c_serialnumber"
      icon: mdi:barcode
      device: *solaredge_device

    - unique_id: solaredge_c_deviceaddress
      name: "SolarEdge Modbus Address"
      state_topic: "solaredge/inverter/c_deviceaddress"
      icon: mdi:network-outline
      device: *solaredge_device

    - unique_id: solaredge_c_sunspec_did
      name: "SolarEdge SunSpec Inverter DID"
      state_topic: "solaredge/inverter/c_sunspec_did"
      icon: mdi:identifier
      device: *solaredge_device

    - unique_id: solaredge_c_sunspec_length
      name: "SolarEdge SunSpec Inverter Length"
      state_topic: "solaredge/inverter/c_sunspec_length"
      icon: mdi:ruler
      device: *solaredge_device

    # =====================================================================
    # Inverter — AC Current
    # =====================================================================

    - unique_id: solaredge_current
      name: "SolarEdge AC Current"
      state_topic: "solaredge/inverter/current"
      device_class: current
      unit_of_measurement: "A"
      state_class: measurement
      icon: mdi:current-ac
      device: *solaredge_device

    - unique_id: solaredge_l1_current
      name: "SolarEdge L1 Current"
      state_topic: "solaredge/inverter/l1_current"
      device_class: current
      unit_of_measurement: "A"
      state_class: measurement
      icon: mdi:current-ac
      device: *solaredge_device

    - unique_id: solaredge_l2_current
      name: "SolarEdge L2 Current"
      state_topic: "solaredge/inverter/l2_current"
      device_class: current
      unit_of_measurement: "A"
      state_class: measurement
      icon: mdi:current-ac
      device: *solaredge_device

    - unique_id: solaredge_l3_current
      name: "SolarEdge L3 Current"
      state_topic: "solaredge/inverter/l3_current"
      device_class: current
      unit_of_measurement: "A"
      state_class: measurement
      icon: mdi:current-ac
      device: *solaredge_device

    # =====================================================================
    # Inverter — AC Voltage
    # =====================================================================

    - unique_id: solaredge_l1_voltage
      name: "SolarEdge L1 Voltage"
      state_topic: "solaredge/inverter/l1_voltage"
      device_class: voltage
      unit_of_measurement: "V"
      state_class: measurement
      icon: mdi:sine-wave
      device: *solaredge_device

    - unique_id: solaredge_l2_voltage
      name: "SolarEdge L2 Voltage"
      state_topic: "solaredge/inverter/l2_voltage"
      device_class: voltage
      unit_of_measurement: "V"
      state_class: measurement
      icon: mdi:sine-wave
      device: *solaredge_device

    - unique_id: solaredge_l3_voltage
      name: "SolarEdge L3 Voltage"
      state_topic: "solaredge/inverter/l3_voltage"
      device_class: voltage
      unit_of_measurement: "V"
      state_class: measurement
      icon: mdi:sine-wave
      device: *solaredge_device

    - unique_id: solaredge_l1n_voltage
      name: "SolarEdge L1-N Voltage"
      state_topic: "solaredge/inverter/l1n_voltage"
      device_class: voltage
      unit_of_measurement: "V"
      state_class: measurement
      icon: mdi:sine-wave
      device: *solaredge_device

    - unique_id: solaredge_l2n_voltage
      name: "SolarEdge L2-N Voltage"
      state_topic: "solaredge/inverter/l2n_voltage"
      device_class: voltage
      unit_of_measurement: "V"
      state_class: measurement
      icon: mdi:sine-wave
      device: *solaredge_device

    - unique_id: solaredge_l3n_voltage
      name: "SolarEdge L3-N Voltage"
      state_topic: "solaredge/inverter/l3n_voltage"
      device_class: voltage
      unit_of_measurement: "V"
      state_class: measurement
      icon: mdi:sine-wave
      device: *solaredge_device

    # =====================================================================
    # Inverter — AC Power
    # =====================================================================

    - unique_id: solaredge_power_ac
      name: "SolarEdge AC Power"
      state_topic: "solaredge/inverter/power_ac"
      device_class: power
      unit_of_measurement: "W"
      state_class: measurement
      icon: mdi:solar-power
      device: *solaredge_device

    # =====================================================================
    # Inverter — Frequency
    # =====================================================================

    - unique_id: solaredge_frequency
      name: "SolarEdge Frequency"
      state_topic: "solaredge/inverter/frequency"
      device_class: frequency
      unit_of_measurement: "Hz"
      state_class: measurement
      icon: mdi:waveform
      device: *solaredge_device

    # =====================================================================
    # Inverter — Apparent Power
    # =====================================================================

    - unique_id: solaredge_power_apparent
      name: "SolarEdge Apparent Power"
      state_topic: "solaredge/inverter/power_apparent"
      device_class: apparent_power
      unit_of_measurement: "VA"
      state_class: measurement
      icon: mdi:flash-outline
      device: *solaredge_device

    # =====================================================================
    # Inverter — Reactive Power
    # =====================================================================

    - unique_id: solaredge_power_reactive
      name: "SolarEdge Reactive Power"
      state_topic: "solaredge/inverter/power_reactive"
      device_class: reactive_power
      unit_of_measurement: "var"
      state_class: measurement
      icon: mdi:flash-outline
      device: *solaredge_device

    # =====================================================================
    # Inverter — Power Factor
    # =====================================================================

    - unique_id: solaredge_power_factor
      name: "SolarEdge Power Factor"
      state_topic: "solaredge/inverter/power_factor"
      device_class: power_factor
      unit_of_measurement: "%"
      state_class: measurement
      icon: mdi:angle-acute
      device: *solaredge_device

    # =====================================================================
    # Inverter — Total Energy
    # =====================================================================

    - unique_id: solaredge_energy_total
      name: "SolarEdge Total Energy"
      state_topic: "solaredge/inverter/energy_total"
      device_class: energy
      unit_of_measurement: "Wh"
      state_class: total_increasing
      icon: mdi:solar-power-variant
      device: *solaredge_device

    # =====================================================================
    # Inverter — DC Current
    # =====================================================================

    - unique_id: solaredge_current_dc
      name: "SolarEdge DC Current"
      state_topic: "solaredge/inverter/current_dc"
      device_class: current
      unit_of_measurement: "A"
      state_class: measurement
      icon: mdi:current-dc
      device: *solaredge_device

    # =====================================================================
    # Inverter — DC Voltage
    # =====================================================================

    - unique_id: solaredge_voltage_dc
      name: "SolarEdge DC Voltage"
      state_topic: "solaredge/inverter/voltage_dc"
      device_class: voltage
      unit_of_measurement: "V"
      state_class: measurement
      icon: mdi:sine-wave
      device: *solaredge_device

    # =====================================================================
    # Inverter — DC Power
    # =====================================================================

    - unique_id: solaredge_power_dc
      name: "SolarEdge DC Power"
      state_topic: "solaredge/inverter/power_dc"
      device_class: power
      unit_of_measurement: "W"
      state_class: measurement
      icon: mdi:solar-panel-large
      device: *solaredge_device

    # =====================================================================
    # Inverter — Temperature
    # =====================================================================

    - unique_id: solaredge_temperature
      name: "SolarEdge Inverter Temperature"
      state_topic: "solaredge/inverter/temperature"
      device_class: temperature
      unit_of_measurement: "°C"
      state_class: measurement
      icon: mdi:thermometer
      device: *solaredge_device

    # =====================================================================
    # Inverter — Status
    # =====================================================================

    - unique_id: solaredge_status
      name: "SolarEdge Inverter Status"
      state_topic: "solaredge/inverter/status"
      icon: mdi:information-outline
      value_template: >
        {% set status_map = {
          1: "Off",
          2: "Sleeping",
          3: "Grid Monitoring",
          4: "Producing",
          5: "Producing (Throttled)",
          6: "Shutting Down",
          7: "Fault",
          8: "Standby"
        } %}
        {{ status_map.get(value | int(0), "Unknown (" ~ value ~ ")") }}
      device: *solaredge_device

    - unique_id: solaredge_vendor_status
      name: "SolarEdge Vendor Status"
      state_topic: "solaredge/inverter/vendor_status"
      icon: mdi:information-outline
      entity_category: diagnostic
      device: *solaredge_device

    # =====================================================================
    # Inverter — Power Control
    # =====================================================================

    - unique_id: solaredge_rrcr_state
      name: "SolarEdge RRCR State"
      state_topic: "solaredge/inverter/rrcr_state"
      icon: mdi:toggle-switch-outline
      entity_category: diagnostic
      device: *solaredge_device

    - unique_id: solaredge_active_power_limit
      name: "SolarEdge Active Power Limit"
      state_topic: "solaredge/inverter/active_power_limit"
      unit_of_measurement: "%"
      icon: mdi:speedometer
      entity_category: diagnostic
      device: *solaredge_device

    - unique_id: solaredge_cosphi
      name: "SolarEdge CosPhi"
      state_topic: "solaredge/inverter/cosphi"
      icon: mdi:angle-acute
      entity_category: diagnostic
      device: *solaredge_device

    - unique_id: solaredge_commit_power_control_settings
      name: "SolarEdge Commit Power Control Settings"
      state_topic: "solaredge/inverter/commit_power_control_settings"
      icon: mdi:cog
      entity_category: diagnostic
      device: *solaredge_device

    - unique_id: solaredge_restore_power_control_default_settings
      name: "SolarEdge Restore Power Control Default Settings"
      state_topic: "solaredge/inverter/restore_power_control_default_settings"
      icon: mdi:cog-refresh
      entity_category: diagnostic
      device: *solaredge_device

    - unique_id: solaredge_reactive_power_config
      name: "SolarEdge Reactive Power Config"
      state_topic: "solaredge/inverter/reactive_power_config"
      icon: mdi:cog-outline
      value_template: >
        {% set config_map = {
          0: "Fixed CosPhi Mode",
          1: "Fixed Q Mode",
          2: "CosPhi(P) Mode",
          3: "Q(U) + Q(P) Mode",
          4: "RRCR Mode"
        } %}
        {{ config_map.get(value | int(0), "Unknown (" ~ value ~ ")") }}
      entity_category: diagnostic
      device: *solaredge_device

    - unique_id: solaredge_reactive_power_response_time
      name: "SolarEdge Reactive Power Response Time"
      state_topic: "solaredge/inverter/reactive_power_response_time"
      unit_of_measurement: "ms"
      icon: mdi:timer-outline
      entity_category: diagnostic
      device: *solaredge_device

    - unique_id: solaredge_advanced_power_control_enable
      name: "SolarEdge Advanced Power Control Enable"
      state_topic: "solaredge/inverter/advanced_power_control_enable"
      icon: mdi:toggle-switch
      entity_category: diagnostic
      device: *solaredge_device

    # =====================================================================
    # Inverter — Export Control
    # =====================================================================

    - unique_id: solaredge_export_control_mode
      name: "SolarEdge Export Control Mode"
      state_topic: "solaredge/inverter/export_control_mode"
      icon: mdi:export
      entity_category: diagnostic
      device: *solaredge_device

    - unique_id: solaredge_export_control_limit_mode
      name: "SolarEdge Export Control Limit Mode"
      state_topic: "solaredge/inverter/export_control_limit_mode"
      icon: mdi:export
      value_template: >
        {% set limit_map = {
          0: "Total",
          1: "Per Phase"
        } %}
        {{ limit_map.get(value | int(0), "Unknown (" ~ value ~ ")") }}
      entity_category: diagnostic
      device: *solaredge_device

    - unique_id: solaredge_export_control_site_limit
      name: "SolarEdge Export Control Site Limit"
      state_topic: "solaredge/inverter/export_control_site_limit"
      device_class: power
      unit_of_measurement: "W"
      icon: mdi:transmission-tower-export
      entity_category: diagnostic
      device: *solaredge_device

    # =====================================================================
    # Timestamp
    # =====================================================================

    - unique_id: solaredge_timestamp
      name: "SolarEdge Last Update"
      state_topic: "solaredge/inverter/_timestamp"
      device_class: timestamp
      icon: mdi:clock-outline
      device: *solaredge_device
