          {% set scale = states('sensor.solaredge_voltage_scale_factor') | int(0) %}
          {{ (raw * 10**(scale)) | round(1) }}
        availability: >
          {{ states('sensor.solaredge_l2_n_voltage_raw') not in ['unknown', 'unavailable']
             and states('sensor.solaredge_voltage_scale_factor') not in ['unknown', 'unavailable'] }}

      - unique_id: solaredge_l3n_voltage
        name: "SolarEdge L3-N Voltage"
        unit_of_measurement: "V"
        device_class: voltage
        state_class: measurement
        icon: mdi:sine-wave
        state: >
          {% set raw = states('sensor.solaredge_l3_n_voltage_raw') | float(0) %}
          {% set scale = states('sensor.solaredge_voltage_scale_factor') | int(0) %}
          {{ (raw * 10**(scale)) | round(1) }}
        availability: >
          {{ states('sensor.solaredge_l3_n_voltage_raw') not in ['unknown', 'unavailable']
